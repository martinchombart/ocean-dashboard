<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ocean Health Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/src/style.css"/>
</head>
<body class="overflow-hidden flex font-sans select-none" style="height:100dvh;background:#082f49;color:white">

  <!-- LEFT COLUMN: header + map -->
  <div class="flex flex-col flex-1 min-w-0 min-h-0 overflow-hidden">

  <!-- TOP BAR -->
  <header class="flex-shrink-0 h-16 flex items-center px-5 gap-0 z-50 border-b"
          style="background:linear-gradient(90deg,#0369a1 0%,#0284c7 100%);border-color:rgba(255,255,255,0.15)">
    <div class="font-display font-black text-[26px] tracking-tight mr-8 whitespace-nowrap text-white">
      Ocean <span style="color:#7dd3fc">Health</span> Dashboard
    </div>

    <nav id="data-tabs" class="flex gap-1.5 flex-1">
      <button class="data-tab active" data-key="temperature">
        <span class="tab-dot"></span>Temperature
      </button>
      <button class="data-tab" data-key="salinity">
        <span class="tab-dot"></span>Salinity
      </button>
      <button class="data-tab" data-key="ph">
        <span class="tab-dot"></span>pH
      </button>
    </nav>

  </header>

  <!-- MAIN -->
  <div class="flex flex-1 min-h-0 overflow-hidden">

    <!-- MAP -->
    <div id="map-wrap" class="flex-1 relative overflow-hidden">
      <div id="map" class="absolute inset-0"></div>

      <!-- Cursor tooltip -->
      <div id="tooltip"
        class="fixed z-50 pointer-events-none hidden
               rounded-2xl px-3.5 py-2.5 min-w-[155px] backdrop-blur-md shadow-glow-blue"
        style="background:rgba(240,249,255,0.95);border:1px solid #bae6fd">
        <div id="tt-label" class="text-[12px] font-bold uppercase tracking-wider mb-1" style="color:#0369a1"></div>
        <div id="tt-value" class="font-display font-black text-[26px] leading-none" style="color:#0c4a6e"></div>
        <div id="tt-unit"  class="text-[13px] font-semibold mt-1" style="color:#0284c7"></div>
        <div id="tt-coord" class="text-[11px] mt-2 pt-2" style="color:#7dd3fc;border-top:1px solid #bae6fd"></div>
      </div>

      <!-- Legend -->
      <div id="legend"
        class="absolute left-4 top-4 z-30 rounded-2xl px-3 py-2.5 backdrop-blur-md min-w-[190px]"
        style="background:rgba(240,249,255,0.95);border:1px solid #bae6fd">
        <div id="leg-title" class="text-[12px] font-bold uppercase tracking-wide mb-2" style="color:#0369a1"></div>
        <div id="leg-bar"   class="h-2.5 rounded-full w-full mb-2"></div>
        <div class="flex justify-between text-[11px] font-semibold" style="color:#0284c7">
          <span id="leg-min"></span><span id="leg-mid"></span><span id="leg-max"></span>
        </div>
        <div id="leg-mode" class="text-[11px] mt-1.5" style="color:#38bdf8"></div>
      </div>

      <!-- Mode badge -->
      <div id="mode-badge"
        class="absolute top-4 left-1/2 -translate-x-1/2 z-30 pointer-events-none
               border border-ocean-700 rounded-full
               px-4 py-2 text-[13px] font-semibold backdrop-blur-md
               flex items-center gap-2 whitespace-nowrap"
        style="background:rgba(240,249,255,0.92);border:1px solid #bae6fd;color:#075985">
        <span class="w-1.5 h-1.5 rounded-full inline-block" style="background:#0ea5e9"></span>
        <span id="badge-text">Normal Mode · 2024 · Full Year</span>
      </div>

      <!-- Compare toggle + season — top-right overlay -->
      <div class="absolute top-4 right-4 z-30 flex flex-col gap-2 items-end">

        <!-- Compare toggle -->
        <div class="flex items-center gap-2 px-3 py-2 rounded-2xl backdrop-blur-md"
             style="background:rgba(240,249,255,0.95);border:1px solid #bae6fd">
          <span class="text-[13px] font-semibold" style="color:#0369a1">Normal</span>
          <button id="compare-toggle"
            class="relative w-11 h-6 rounded-full border transition-all duration-200 focus:outline-none"
            style="border-color:#7dd3fc;background:#bae6fd" role="switch" aria-checked="false">
            <span id="toggle-thumb"
              class="absolute top-[3px] left-[3px] w-4 h-4 rounded-full bg-white
                     transition-all duration-200 pointer-events-none"></span>
          </button>
          <span class="text-[13px] font-semibold" style="color:#0369a1">Compare</span>
          <div id="compare-pill" class="hidden items-center gap-1.5 ml-1" style="color:#0ea5e9">
            <span class="w-2 h-2 rounded-full animate-pulse inline-block" style="background:#0ea5e9"></span>
            <span class="text-[12px] font-bold">ON</span>
          </div>
        </div>

        <!-- Season selector -->
        <div id="season-dropdown" class="rounded-2xl backdrop-blur-md overflow-hidden"
             style="background:rgba(240,249,255,0.95);border:1px solid #bae6fd;min-width:100px">
          <button id="season-trigger"
            class="w-full px-3 py-2 flex items-center justify-between gap-3 cursor-pointer">
            <span id="season-label" class="text-[13px] font-semibold" style="color:#0369a1">Full Year</span>
            <span id="season-arrow" class="text-[16px]" style="color:#0284c7;transition:transform 200ms">▾</span>
          </button>
          <div id="season-options" style="max-height:0;overflow:hidden;transition:max-height 220ms ease">
            <div class="season-opt px-3 py-1.5 text-[13px] font-semibold cursor-pointer" data-value="year"   style="color:#0369a1;border-top:1px solid #e0f2fe">Full Year</div>
            <div class="season-opt px-3 py-1.5 text-[13px] font-semibold cursor-pointer" data-value="spring" style="color:#0369a1;border-top:1px solid #e0f2fe">Spring</div>
            <div class="season-opt px-3 py-1.5 text-[13px] font-semibold cursor-pointer" data-value="summer" style="color:#0369a1;border-top:1px solid #e0f2fe">Summer</div>
            <div class="season-opt px-3 py-1.5 text-[13px] font-semibold cursor-pointer" data-value="fall"   style="color:#0369a1;border-top:1px solid #e0f2fe">Fall</div>
            <div class="season-opt px-3 py-1.5 text-[13px] font-semibold cursor-pointer" data-value="winter" style="color:#0369a1;border-top:1px solid #e0f2fe">Winter</div>
          </div>
        </div>

      </div>

      <!-- BOTTOM ROW: zoom | timeline | projection -->
      <div class="absolute bottom-4 left-4 right-4 z-30 flex items-center gap-3">

        <!-- Zoom buttons -->
        <div class="flex flex-col gap-1 flex-shrink-0">
          <button id="btn-zoom-in"    class="zoom-btn">+</button>
          <button id="btn-zoom-out"   class="zoom-btn">−</button>
          <button id="btn-zoom-reset" class="zoom-btn text-[10px]">⊙</button>
        </div>

        <!-- Timeline -->
        <div class="flex-1 flex items-center gap-4 px-5 py-3 rounded-2xl backdrop-blur-md"
             style="background:rgba(240,249,255,0.95);border:1px solid #bae6fd">
          <span class="text-[13px] font-bold uppercase tracking-widest whitespace-nowrap" style="color:#0284c7">Timeline</span>
          <div id="tl-track" class="flex-1 relative h-12 cursor-pointer mr-6 overflow-visible">
            <div class="absolute top-1/2 -translate-y-1/2 left-0 right-0 h-[3px] rounded-full"
                 style="background:#bae6fd"></div>
            <div id="tl-fill" class="absolute top-1/2 -translate-y-1/2 h-[3px] rounded-full"
                 style="left:0%;width:100%;background:#0ea5e9;box-shadow:0 0 8px 1px rgba(14,165,233,0.5)"></div>
            <div id="tl-marks"></div>
            <div id="tl-cursor" class="absolute top-1/2 -translate-x-1/2 z-20" style="width:0;cursor:grab">
              <span id="tl-cursor-yr" class="absolute font-display font-black text-[15px] whitespace-nowrap -translate-x-1/2" style="bottom:14px;left:0;color:#0284c7"></span>
              <div class="absolute w-3 h-3 rounded-full -translate-x-1/2 -translate-y-1/2" style="left:0;top:0;background:#0ea5e9;box-shadow:0 0 12px 3px rgba(14,165,233,0.7)"></div>
            </div>
            <div id="hdl-a" class="tl-handle hidden bg-ocean-warm border-ocean-warm shadow-glow-orange"></div>
            <div id="hdl-b" class="tl-handle hidden bg-ocean-accent border-ocean-accent shadow-glow-blue"></div>
            <div id="tl-cmp-hint" class="hidden absolute top-1 left-1/2 -translate-x-1/2
                 text-[11px] font-semibold text-ocean-accent/50 whitespace-nowrap pointer-events-none">
              Drag handles to compare years
            </div>
          </div>
        </div>

        <!-- Projection toggle -->
        <div class="flex-shrink-0 flex items-center gap-2 px-3 py-2 rounded-2xl backdrop-blur-md"
             style="background:rgba(240,249,255,0.95);border:1px solid #bae6fd">
          <span class="text-[13px] font-semibold" style="color:#0369a1">Plan</span>
          <button id="projection-toggle"
            class="relative w-11 h-6 rounded-full border transition-all duration-200 focus:outline-none"
            style="background:#0ea5e9;border-color:#0ea5e9" role="switch" aria-checked="true">
            <span id="proj-thumb"
              class="absolute top-[3px] left-[3px] w-4 h-4 rounded-full bg-white
                     transition-all duration-200 pointer-events-none"
              style="transform:translateX(20px)"></span>
          </button>
          <span class="text-[13px] font-semibold" style="color:#0369a1">Globe</span>
        </div>

      </div>

      <!-- Loading overlay -->
      <div id="loading"
        class="absolute inset-0 z-50 bg-ocean-950 flex flex-col
               items-center justify-center gap-4 transition-opacity duration-500">
        <div class="w-8 h-8 rounded-full border-2 border-ocean-700 border-t-ocean-accent animate-spin"></div>
        <p id="loading-text" class="font-display font-bold text-[13px] text-gray-500">Initializing…</p>
      </div>
    </div>

  </div><!-- end MAIN -->
  </div><!-- end LEFT COLUMN -->

    <!-- INFO PANEL (full height, overlaps header) -->
    <aside id="info-panel"
      class="w-96 flex-shrink-0 border-l flex flex-col overflow-hidden relative transition-[width] duration-300"
      style="border-color:#bae6fd">
      <button id="panel-toggle"
        class="absolute -left-[15px] top-1/2 -translate-y-1/2 z-10 w-[15px] h-12
               border border-r-0 rounded-l-xl
               flex items-center justify-center transition-colors text-[11px] font-bold"
        style="background:#e0f2fe;border-color:#bae6fd;color:#0369a1">‹</button>
      <div id="panel-content"
        class="flex-1 overflow-y-auto p-5 space-y-4"
        style="scrollbar-width:thin;scrollbar-color:#bae6fd transparent">
      </div>
    </aside>



  <script type="module" src="/src/main.js"></script>
</body>
</html>
